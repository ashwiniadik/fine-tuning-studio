name: Bug report
description: Something in the app or a generated notebook doesn't work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. If this is a **security vulnerability**, please don't file it here -- see [SECURITY.md](../../SECURITY.md) for private disclosure instead.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: |
        Include what you uploaded (or a minimal example that reproduces it) -- e.g. a shortened `.jsonl`, the domain name and model you picked, whether raw text / preference data were included.
      placeholder: |
        1. Upload instruction dataset with '...'
        2. Set domain to '...', model to '...'
        3. Click Generate
        4. See error / broken notebook cell '...'
    validations:
      required: true

  - type: dropdown
    id: where
    attributes:
      label: Where did this happen?
      options:
        - Web UI (frontend)
        - API (/api/generate or /api/models directly)
        - A generated notebook, when run in Colab
        - Test suite / local dev
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS/browser if UI-related; Python version and `pip freeze` output if running locally.
    validations:
      required: false
