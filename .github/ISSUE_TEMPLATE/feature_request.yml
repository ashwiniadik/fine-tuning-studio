name: Feature request
description: Suggest a new model, pipeline stage, dataset format, or other addition
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that the app doesn't support today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        What would you like to see? If it's a new base model, note whether it's confirmed to run on a free Colab T4 GPU with Unsloth + QLoRA. If it's a new pipeline stage or dataset format, sketch what the validation rule and notebook template would need to do.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you're using today, or other approaches you thought about.
    validations:
      required: false
